# LiteLLM proxy configuration for the gateway (api-keys / both contour
# only -- see delegation.config.yaml's `contour` field).
#
# generated by onboarding from delegation.config.yaml -- the aliases
# below mirror that file's `roles:` block one-to-one. Placeholders use
# {{ROLE_MODEL}}-style names; onboarding fills them in from each role's
# `api.provider` / `api.model` / `api.api_key_env`. Hand-editing a
# binding here works too, but re-running onboarding is the source of
# truth -- keep delegation.config.yaml and this file in sync by hand if
# you skip it.
#
# Run from the gateway/ directory so the callback modules resolve:
#   litellm --config config.yaml
#
# API keys are taken from the environment (the api_key_env named for
# each role in delegation.config.yaml) -- litellm does NOT read a
# gateway/.env file on its own; export the variables before starting
# the proxy.

model_list:
  # Coordination tier (delegation.config.yaml roles.lead).
  - model_name: lead
    litellm_params:
      model: {{LEAD_PROVIDER}}/{{LEAD_MODEL}}
      api_key: os.environ/{{LEAD_API_KEY_ENV}}

  # Mandatory acceptance gate for builder-class diffs (CLAUDE.md rule 3;
  # delegation.config.yaml roles.critic).
  - model_name: critic
    litellm_params:
      model: {{CRITIC_PROVIDER}}/{{CRITIC_MODEL}}
      api_key: os.environ/{{CRITIC_API_KEY_ENV}}

  # Implementation from a written spec (CLAUDE.md rule 2;
  # delegation.config.yaml roles.builder).
  - model_name: builder
    litellm_params:
      model: {{BUILDER_PROVIDER}}/{{BUILDER_MODEL}}
      api_key: os.environ/{{BUILDER_API_KEY_ENV}}

  # Recon: repo search, file reading, context gathering (CLAUDE.md
  # rule 1; delegation.config.yaml roles.scout).
  - model_name: scout
    litellm_params:
      model: {{SCOUT_PROVIDER}}/{{SCOUT_MODEL}}
      api_key: os.environ/{{SCOUT_API_KEY_ENV}}

  # Shadow Evaluation judge (shadow_eval.py --judge-model) -- a
  # supervised worker, not a rules-level function (CLAUDE.md's
  # function/grade split). api-keys-only in delegation.config.yaml;
  # calibrate it against judge_calibration.json before trusting it
  # (see gateway/README.md "Shadow Evaluation").
  - model_name: judge
    litellm_params:
      model: {{JUDGE_PROVIDER}}/{{JUDGE_MODEL}}
      api_key: os.environ/{{JUDGE_API_KEY_ENV}}

  # The local Ledger/Guard analyst worker (analyst.py) -- reads Ledger
  # digests only, never raw conversations. Named separately from
  # `builder`/`scout` so its cost stays separable in the Ledger even
  # when it happens to share an underlying model with one of them.
  - model_name: analyst
    litellm_params:
      model: {{ANALYST_PROVIDER}}/{{ANALYST_MODEL}}
      api_key: os.environ/{{ANALYST_API_KEY_ENV}}

  # Smoke-test model: never calls a provider, needs no API key.
  - model_name: mock
    litellm_params:
      model: {{LEAD_PROVIDER}}/{{LEAD_MODEL}}
      mock_response: pong

litellm_settings:
  callbacks: [sqlite_logger.logger_instance, guard.guard_instance]

# sqlite_logger.py raw-text logging: GATEWAY_LOG_RAW_TEXT (env var, not
# a config key here) controls whether the requests.db `prompt`/
# `response` columns store real conversation text. Default disabled --
# both columns hold a masking marker instead; accounting fields
# (model, tokens, cost, category, traffic_kind) are unaffected either
# way. Set GATEWAY_LOG_RAW_TEXT=true only deliberately, e.g. for a
# Shadow Evaluation session: the log then contains raw prompt text,
# which may be sensitive -- see gateway/README.md "Raw text logging"
# for the full warning and the purge note (no built-in TTL/purge;
# clearing raw content after a replay session is the operator's duty).
